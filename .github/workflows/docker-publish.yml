name: Build and Push to GHCR

# Déclencheur : chaque push sur la branche main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Permissions nécessaires pour écrire dans le registre de packages
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Récupère le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Se connecte au registre GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build l'image et la pousse automatiquement
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Le tag sera : ghcr.io/ton-pseudo/nom-du-repo:latest
          tags: ghcr.io/alexandre-ramirez/i324_projet_entrainement:latest