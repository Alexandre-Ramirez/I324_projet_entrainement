name: Matrix Multi-Version Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-node:
    runs-on: ubuntu-latest

    strategy:
      # La matrice définit les variations
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        # On simule un test car votre package.json n'en a pas encore de vrai
        run: npm test || echo "Aucun test défini, mais Node ${{ matrix.node-version }} fonctionne !"